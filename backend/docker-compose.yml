services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    build: ./MindMeal.API
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=MindMealDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      AppSettings__Token: "${JWT_TOKEN}"
      AppSettings__Issuer: "${JWT_ISSUER}"
      AppSettings__Audience: "${JWT_AUDIENCE}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
    depends_on:
      - db

volumes:
  mssql-data: