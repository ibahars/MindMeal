services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: MindMealDb
      POSTGRES_USER: mindmeal
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: ./MindMeal.API
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=MindMealDb;Username=mindmeal;Password=${DB_PASSWORD}"
      AppSettings__Token: "${JWT_TOKEN}"
      AppSettings__Issuer: "${JWT_ISSUER}"
      AppSettings__Audience: "${JWT_AUDIENCE}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
    depends_on:
      - db

volumes:
  postgres-data: